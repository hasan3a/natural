<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
@media (max-width: 1024px) {
  body { padding-top: 80px !important; }
}

.mnh__wrap {
  --mnh-bg: #ffffff;
  --mnh-accent: rgb(7, 123, 78);
  --mnh-text: #111111;
  --mnh-muted: #999;
  --mnh-border: rgba(0,0,0,0.1);
  --mnh-h: 80px;
  font-family: 'Geist', 'Inter', sans-serif;
  box-sizing: border-box;
}
.mnh__wrap *, .mnh__wrap *::before, .mnh__wrap *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ── BAR ── */
.mnh__bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--mnh-h);
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--mnh-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 9900;
}

/* ── LOGO ── */
.mnh__logo {
  display: flex;
  align-items: center;
  text-decoration: none;
  flex-shrink: 0;
}
.mnh__logo img {
  max-height: 44px;
  display: block;
}

/* ── DESKTOP NAV LINKS (centre) ── */
.mnh__desktop-nav {
  display: none;
  align-items: center;
  gap: 4px;
  flex: 1;
  justify-content: center;
}
.mnh__desktop-nav a {
  text-decoration: none;
  color: var(--mnh-text);
  font-size: 0.875rem;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 8px;
  transition: background 0.18s, color 0.18s;
  white-space: nowrap;
}
.mnh__desktop-nav a:hover {
  background: rgba(7,123,78,0.08);
  color: var(--mnh-accent);
}

/* ── DESKTOP RIGHT SIDE ── */
.mnh__desktop-right {
  display: none;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.mnh__desktop-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--mnh-accent);
  color: #fff !important;
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 10px;
  transition: opacity 0.2s, transform 0.15s;
  white-space: nowrap;
}
.mnh__desktop-cta:hover { opacity: 0.85; transform: translateY(-1px); }
.mnh__desktop-cta svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── MOBILE ACTIONS ── */
.mnh__mobile-actions {
  display: flex;
  align-items: center;
}

/* ── HAMBURGER ── */
.mnh__burger {
  width: 44px !important;
  height: 44px !important;
  border-radius: 10px !important;
  border: 1px solid var(--mnh-border) !important;
  background: transparent !important;
  cursor: pointer !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 5px !important;
  transition: border-color 0.2s, background 0.2s !important;
  padding: 0 !important;
  box-shadow: none !important;
  outline: none !important;
  -webkit-appearance: none;
  appearance: none;
}
.mnh__burger:hover {
  background: rgba(7,123,78,0.08) !important;
  border-color: var(--mnh-accent) !important;
}
.mnh__burger-line {
  display: block !important;
  height: 2px !important;
  background: #1a1a1a !important;
  border-radius: 2px !important;
  transition: transform 0.4s cubic-bezier(.77,0,.175,1), opacity 0.3s, width 0.3s !important;
}
.mnh__burger-line:nth-child(1) { width: 22px !important; }
.mnh__burger-line:nth-child(2) { width: 15px !important; }
.mnh__burger-line:nth-child(3) { width: 22px !important; }

.mnh__burger--active .mnh__burger-line:nth-child(1) { width: 20px !important; transform: translateY(7px) rotate(45deg) !important; }
.mnh__burger--active .mnh__burger-line:nth-child(2) { opacity: 0 !important; transform: scaleX(0) !important; }
.mnh__burger--active .mnh__burger-line:nth-child(3) { width: 20px !important; transform: translateY(-7px) rotate(-45deg) !important; }

/* ── OVERLAY ── */
.mnh__overlay {
  position: fixed;
  inset: 0;
  top: var(--mnh-h);
  background: var(--mnh-bg);
  z-index: 9899;
  display: flex;
  flex-direction: column;
  padding: 32px 26px 40px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s cubic-bezier(.77,0,.175,1);
  overflow-y: auto;
}
.mnh__overlay--open {
  pointer-events: all;
  opacity: 1;
}

/* ── NAV LIST ── */
.mnh__nav-list { list-style: none; flex: 1; }
.mnh__nav-item {
  border-bottom: 1px solid var(--mnh-border);
  overflow: hidden;
}
.mnh__nav-item:first-child { border-top: 1px solid var(--mnh-border); }

.mnh__nav-link {
  display: block;
  text-decoration: none;
  color: var(--mnh-text) !important;
  font-family: 'Source Sans 3', 'Geist', sans-serif;
  font-weight: 700;
  font-size: clamp(1.4rem, 5vw, 2rem);
  letter-spacing: -0.01em;
  padding: 14px 0;
  transform: translateY(30px);
  opacity: 0;
  transition: transform 0.45s cubic-bezier(.77,0,.175,1), opacity 0.35s ease, color 0.2s;
}
.mnh__nav-link:hover { color: var(--mnh-accent) !important; }
.mnh__overlay--open .mnh__nav-link { transform: translateY(0); opacity: 1; }
.mnh__nav-item:nth-child(1) .mnh__nav-link { transition-delay: 0.06s; }
.mnh__nav-item:nth-child(2) .mnh__nav-link { transition-delay: 0.10s; }
.mnh__nav-item:nth-child(3) .mnh__nav-link { transition-delay: 0.14s; }
.mnh__nav-item:nth-child(4) .mnh__nav-link { transition-delay: 0.18s; }
.mnh__nav-item:nth-child(5) .mnh__nav-link { transition-delay: 0.22s; }
.mnh__nav-item:nth-child(6) .mnh__nav-link { transition-delay: 0.26s; }
.mnh__nav-item:nth-child(7) .mnh__nav-link { transition-delay: 0.30s; }

/* ── SUBMENU TRIGGER ── */
.mnh__nav-item--has-sub .mnh__nav-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.mnh__sub-arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--mnh-border);
  transition: transform 0.35s cubic-bezier(.77,0,.175,1), background 0.2s, border-color 0.2s;
  margin-left: 12px;
}
.mnh__sub-arrow svg {
  width: 16px; height: 16px;
  stroke: currentColor; fill: none;
  stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
  transition: stroke 0.2s;
}
.mnh__nav-item--sub-open .mnh__sub-arrow {
  transform: rotate(180deg);
  background: rgba(7,123,78,0.1);
  border-color: var(--mnh-accent);
}
.mnh__nav-item--sub-open .mnh__sub-arrow svg { stroke: var(--mnh-accent); }

/* ── SUBMENU LIST ── */
.mnh__sub-list {
  list-style: none;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(.77,0,.175,1), opacity 0.3s ease;
  opacity: 0;
}
.mnh__nav-item--sub-open .mnh__sub-list { max-height: 400px; opacity: 1; }
.mnh__sub-item { border-top: 1px solid var(--mnh-border); }
.mnh__sub-link {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--mnh-text) !important;
  font-weight: 600;
  font-size: clamp(1rem, 4vw, 1.3rem);
  padding: 13px 0 13px 16px;
  transition: color 0.2s;
}
.mnh__sub-link::before {
  content: '';
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--mnh-accent);
  flex-shrink: 0;
  opacity: 0.6;
}
.mnh__sub-link:hover { color: var(--mnh-accent) !important; }
.mnh__sub-link:hover::before { opacity: 1; }

/* ── MENU BOTTOM ── */
.mnh__menu-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 28px;
  transform: translateY(16px);
  opacity: 0;
  transition: transform 0.45s cubic-bezier(.77,0,.175,1) 0.3s, opacity 0.35s ease 0.3s;
}
.mnh__overlay--open .mnh__menu-bottom { transform: translateY(0); opacity: 1; }
.mnh__social-links { display: flex; gap: 12px; }
.mnh__social-link {
  width: 48px; height: 48px;
  border: 1px solid var(--mnh-border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--mnh-text);
  text-decoration: none;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
}
.mnh__social-link:hover {
  border-color: var(--mnh-accent);
  background: rgba(7,123,78,0.08);
  color: var(--mnh-accent);
}
.mnh__social-link svg { width: 20px; height: 20px; }
.mnh__copyright {
  font-size: 0.75rem;
  color: var(--mnh-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
}

/* ══ BREAKPOINTS ══ */
@media (min-width: 1025px) {
  body { padding-top: 80px !important; }
  .mnh__mobile-actions { display: none; }
  .mnh__overlay         { display: none !important; }
  .mnh__desktop-nav     { display: flex; }
  .mnh__desktop-right   { display: flex; }
}
</style>

<div class="mnh__wrap">
  <div class="mnh__bar">

    <!-- Logo -->
    <a href="https://sacaa.co.za" class="mnh__logo">
      <img src="https://sacaa.co.za/wp-content/uploads/2026/03/Layer_1.svg" alt="SACAA logo" loading="eager">
    </a>

    <!-- Desktop nav links (hidden on mobile) -->
    <nav class="mnh__desktop-nav" aria-label="Main navigation">
      <a href="https://sacaa.co.za/">Home</a>
      <a href="https://sacaa.co.za/about/">About</a>
      <a href="https://sacaa.co.za/fly-ash/">Fly Ash</a>
      <a href="https://sacaa.co.za/ccps/">CCPS</a>
      <a href="https://sacaa.co.za/research-publications/">Research &amp; Publications</a>
      <a href="https://sacaa.co.za/membership/">Membership</a>
    </nav>

    <!-- Desktop CTA (hidden on mobile) -->
    <div class="mnh__desktop-right">
      <a href="https://sacaa.co.za/contact/" class="mnh__desktop-cta">
        Get in touch
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>

    <!-- Mobile hamburger (hidden on desktop) -->
    <div class="mnh__mobile-actions">
      <button class="mnh__burger" id="mnhBurger" aria-label="Open menu" aria-expanded="false">
        <span class="mnh__burger-line"></span>
        <span class="mnh__burger-line"></span>
        <span class="mnh__burger-line"></span>
      </button>
    </div>

  </div>

  <!-- Mobile overlay -->
  <div class="mnh__overlay" id="mnhOverlay" aria-hidden="true">
    <ul class="mnh__nav-list">
      <li class="mnh__nav-item"><a href="https://sacaa.co.za/" class="mnh__nav-link">Home</a></li>
      <li class="mnh__nav-item"><a href="https://sacaa.co.za/about/" class="mnh__nav-link">About</a></li>
      <li class="mnh__nav-item"><a href="https://sacaa.co.za/fly-ash/" class="mnh__nav-link">Fly Ash</a></li>
      <li class="mnh__nav-item"><a href="https://sacaa.co.za/ccps/" class="mnh__nav-link">CCPS</a></li>
      <li class="mnh__nav-item"><a href="https://sacaa.co.za/research-publications/" class="mnh__nav-link">Research &amp; Publications</a></li>
      <li class="mnh__nav-item mnh__nav-item--has-sub" id="mnhMembershipItem">
        <span class="mnh__nav-link mnh__nav-link--trigger" role="button" tabindex="0" aria-expanded="false" id="mnhMembershipTrigger">
          Membership
          <span class="mnh__sub-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </span>
        </span>
        <ul class="mnh__sub-list" id="mnhSubList">
          <li class="mnh__sub-item"><a href="https://sacaa.co.za/membership/" class="mnh__sub-link">Membership</a></li>
          <li class="mnh__sub-item"><a href="https://sacaa.co.za/ash-merchants/" class="mnh__sub-link">Ash Merchants</a></li>
        </ul>
      </li>
      <li class="mnh__nav-item"><a href="https://sacaa.co.za/contact/" class="mnh__nav-link">Get in touch</a></li>
    </ul>
    <div class="mnh__menu-bottom">
      <div class="mnh__social-links">
        <a href="#" class="mnh__social-link" aria-label="Instagram">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><circle cx="12" cy="12" r="5"></circle><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle></svg>
        </a>
        <a href="#" class="mnh__social-link" aria-label="Twitter / X">
          <svg fill="currentColor" viewBox="0 0 24 24"><path d="M17.75 3h3.5l-7.63 8.72L22.5 21h-7.02l-4.9-6.41L4.74 21H1.25l8.16-9.33L1.5 3h7.17l4.44 5.81L17.75 3zm-1.23 16.19h1.94L7.57 4.96H5.49l11.03 14.23z"></path></svg>
        </a>
      </div>
      <span class="mnh__copyright">&copy; SACAA</span>
    </div>
  </div>
</div>

<script>
(function() {
  var burger   = document.getElementById('mnhBurger');
  var overlay  = document.getElementById('mnhOverlay');
  var memItem  = document.getElementById('mnhMembershipItem');
  var memTrig  = document.getElementById('mnhMembershipTrigger');
  var isOpen   = false;

  function closeAll() {
    isOpen = false;
    burger.classList.remove('mnh__burger--active');
    overlay.classList.remove('mnh__overlay--open');
    burger.setAttribute('aria-expanded', 'false');
    overlay.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    memItem.classList.remove('mnh__nav-item--sub-open');
    memTrig.setAttribute('aria-expanded', 'false');
  }

  burger.addEventListener('click', function() {
    isOpen = !isOpen;
    burger.classList.toggle('mnh__burger--active', isOpen);
    overlay.classList.toggle('mnh__overlay--open', isOpen);
    burger.setAttribute('aria-expanded', String(isOpen));
    overlay.setAttribute('aria-hidden', String(!isOpen));
    document.body.style.overflow = isOpen ? 'hidden' : '';
    if (!isOpen) {
      memItem.classList.remove('mnh__nav-item--sub-open');
      memTrig.setAttribute('aria-expanded', 'false');
    }
  });

  memTrig.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopImmediatePropagation();
    var open = memItem.classList.toggle('mnh__nav-item--sub-open');
    memTrig.setAttribute('aria-expanded', String(open));
  });

  memTrig.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      var open = memItem.classList.toggle('mnh__nav-item--sub-open');
      memTrig.setAttribute('aria-expanded', String(open));
    }
  });

  overlay.querySelectorAll('.mnh__nav-link').forEach(function(link) {
    if (link === memTrig) return;
    link.addEventListener('click', closeAll);
  });

  overlay.querySelectorAll('.mnh__sub-link').forEach(function(link) {
    link.addEventListener('click', closeAll);
  });
})();
</script>
</body>
</html>
