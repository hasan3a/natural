  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const container = document.getElementById("curveContainer");
    const path = document.getElementById("curvePath");
    //   const btn = document.getElementById('replayBtn');

    function getInitialPath() {
      const w = window.innerWidth,
        h = window.innerHeight;
      return `M0 300 Q${w / 2} 0 ${w} 300 L${w} ${h + 300} Q${w / 2} ${h + 600} 0 ${h + 300} L0 0`;
    }

    function getFlatPath() {
      const w = window.innerWidth,
        h = window.innerHeight;
      return `M0 300 Q${w / 2} 0 ${w} 300 L${w} ${h} Q${w / 2} ${h} 0 ${h} L0 0`;
    }
    function playIntro() {
      const tl = gsap.timeline({
        onComplete: () => {},
      });

      const heroImgs = document.querySelectorAll(
        ".hero_content_image-long img",
      );

      tl.set(container, { top: "-300px" })
        .set(path, { attr: { d: getInitialPath() } })
        .to(path, {
          attr: { d: getFlatPath() },
          duration: 0.75,
          ease: "power4.out",
          delay: 4.2,
        })
        .to(
          container,
          {
            top: "-100vh",
            duration: 0.65,
            ease: "power3.out",
          },
          "-=0.75",
        )
        .to(
          ".intro_svg_logo",
          {
            autoAlpha: 0,
            y: -200,
            duration: 0.8,
            ease: "power3.out",
          },
          "-=1",
        )
        .to(
          ".mnh__bar",
          {
            y: 0,
            duration: 0.8,
            ease: "power4.out",
          },
          "-=.2",
        )
        .to(
          ".primary-heading",
          {
            y: 0,
            autoAlpha: 1,
            duration: 0.6,
            ease: "power4.out",
          },
          "-=.4",
        )
        .to(
          ".hero_para",
          {
            y: 0,
            autoAlpha: 1,
            duration: 0.4,
            ease: "power4.out",
          },
          "-=.4",
        );

      // remaining images
      //   heroImgs.forEach((img, i) => {
      //     tl.fromTo(
      //       img,
      //       { opacity: 0, y: 10, scale: 0.9 },
      //       {
      //         opacity: 1,
      //         y: 0,
      //         scale: 1,
      //         duration: 0.15,
      //         ease: "back.out(3)",
      //       },
      //       `+=${i === 0 ? 0 : 0.00}`,
      //     );
      //   });
      heroImgs.forEach((img, i) => {
        tl.fromTo(
          img,
          { opacity: 0, y: 10, scale: 0.9 },
          {
            opacity: 1,
            y: 0,
            scale: 1,
            duration: 0.45,
            ease: "back.out(3)",
          },
          i === 0 ? "-=0.2" : "<", // 👈 key logic
        );
      });
      tl.fromTo(
        ".question_mark",
        { opacity: 0, scale: 0.8 },
        {
          opacity: 1,
          scale: 1,
          duration: 0.4,
          ease: "back.out(2)",
        },
      );

      tl.add(() => {
        document.querySelector(".question_wrap").classList.add("active");
      });
      tl.fromTo(
        ".btn-wrapper",
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0, duration: 0.4 },
        "-=.2",
      );
 
tl.fromTo('.glow_circle',
  { opacity: 0 },
  { opacity: 1, duration: 0.6, ease: "power2.out" }
);

tl.add(() => {
  document.querySelectorAll('.glow_circle .circle').forEach(el => {
    el.classList.add('active');
  });
});
tl.fromTo('.long_icon', {autoAlpha:0, y:50}, {autoAlpha:1, y:0, duration:.7,ease:'power2.out'},"-=.3")
    }
    playIntro();
    //   btn.addEventListener('click', playIntro);
  </script>

  <script>
    (function () {
      var burger = document.getElementById("mnhBurger");
      var overlay = document.getElementById("mnhOverlay");
      var memItem = document.getElementById("mnhMembershipItem");
      var memTrig = document.getElementById("mnhMembershipTrigger");
      var isOpen = false;

      function closeAll() {
        isOpen = false;
        burger.classList.remove("mnh__burger--active");
        overlay.classList.remove("mnh__overlay--open");
        burger.setAttribute("aria-expanded", "false");
        overlay.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        memItem.classList.remove("mnh__nav-item--sub-open");
        memTrig.setAttribute("aria-expanded", "false");
      }

      burger.addEventListener("click", function () {
        isOpen = !isOpen;
        burger.classList.toggle("mnh__burger--active", isOpen);
        overlay.classList.toggle("mnh__overlay--open", isOpen);
        burger.setAttribute("aria-expanded", String(isOpen));
        overlay.setAttribute("aria-hidden", String(!isOpen));
        document.body.style.overflow = isOpen ? "hidden" : "";
        if (!isOpen) {
          memItem.classList.remove("mnh__nav-item--sub-open");
          memTrig.setAttribute("aria-expanded", "false");
        }
      });

      memTrig.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopImmediatePropagation();
        var open = memItem.classList.toggle("mnh__nav-item--sub-open");
        memTrig.setAttribute("aria-expanded", String(open));
      });

      memTrig.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          var open = memItem.classList.toggle("mnh__nav-item--sub-open");
          memTrig.setAttribute("aria-expanded", String(open));
        }
      });

      overlay.querySelectorAll(".mnh__nav-link").forEach(function (link) {
        if (link === memTrig) return;
        link.addEventListener("click", closeAll);
      });

      overlay.querySelectorAll(".mnh__sub-link").forEach(function (link) {
        link.addEventListener("click", closeAll);
      });
    })();
  </script>
